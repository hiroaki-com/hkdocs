# =============================================================================
# tags.yml 管理ルール
# [ja]  : blog/ および docs/ のfrontmatterでのみ使用
# [en]  : i18n/en/ 以下のfrontmatterでのみ使用
# [all] : 固有名詞・技術ブランド名。ロケール問わず共通使用可
